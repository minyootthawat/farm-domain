services:
  mongodb:
    image: mongo:7
    container_name: farm-domain-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - farm_domain_mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  farm_domain_mongodb_data:
